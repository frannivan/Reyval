# ==========================================
# REYVAL ERP - CONFIGURACIÓN INDEPENDIENTE
# ==========================================

server {
    listen 80;
    server_name reyval.duckdns.org; # REQUISITO: Crear este dominio en DuckDNS

    # Root para el Frontend (Angular)
    root /home/ubuntu/Reyval/frontend/dist/reyval-ui/browser;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }

    # Proxy para el Backend (NestJS / Node.js)
    location ^~ /api/ {
        proxy_pass http://localhost:3001/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # Documentación API (si aplica)
    location ^~ /api/docs/ {
        proxy_pass http://localhost:3001/api/docs/;
    }
}
