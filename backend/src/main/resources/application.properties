# General Configuration
spring.application.name=reyval-api
server.port=8080
server.servlet.context-path=/reyval
app.environment=${APP_ENV:UAT}

# Database Configuration (Managed by DatabaseConfig.java)
# Database Configuration (Standard Spring Boot)
spring.datasource.url=${NEON_DATABASE_URL:jdbc:h2:file:./data/reyval;DB_CLOSE_DELAY=-1}
spring.datasource.username=${DB_USER:sa}
spring.datasource.password=${DB_PASSWORD:password}

# JPA
spring.jpa.hibernate.ddl-auto=create
spring.jpa.defer-datasource-initialization=true
spring.sql.init.mode=always
spring.sql.init.continue-on-error=true
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=${DB_DIALECT:org.hibernate.dialect.H2Dialect}

# H2 Console (Only active if using H2)
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# JWT Configuration
app.jwt.secret=${JWT_SECRET:5Up3rS3cr3tK3yF0rC4s4V1d4JWTG3n3r4t10nMustLB3V3ryL0ng}
app.jwt.expiration-ms=${JWT_EXPIRATION:86400000}

# Debugging
logging.level.org.springframework.web=DEBUG
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE

# Swagger / SpringDoc Compatibility
spring.mvc.pathmatch.matching-strategy=ant_path_matcher
# File Upload Limits
spring.servlet.multipart.max-file-size=50MB
spring.servlet.multipart.max-request-size=50MB
