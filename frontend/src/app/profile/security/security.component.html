<div class="container py-4 mt-2">
  <div class="row justify-content-center">
    <div class="col-md-8 col-lg-6">
      
      <!-- Card Principal -->
      <div class="card shadow-sm border-0" style="border-radius: 16px; overflow: hidden;">
        <!-- Header con gradiente -->
        <div class="card-header bg-dark text-white p-4 text-center border-0">
          <div class="avatar-icon bg-soft-primary rounded-circle mx-auto mb-3 d-flex align-items-center justify-content-center" style="width: 60px; height: 60px; background: rgba(255,255,255,0.1);">
            <i class="fas fa-shield-alt text-primary fs-3"></i>
          </div>
          <h4 class="mb-1 fw-bold">Seguridad de la Cuenta</h4>
          <p class="text-white-50 small mb-0">Administra el acceso y protección de tu cuenta</p>
        </div>

        <div class="card-body p-4 p-lg-5">
          <!-- Alertas de Estado -->
          <div *ngIf="passwordMessage" class="alert alert-success alert-dismissible fade show border-0 shadow-sm mb-4" role="alert">
            <i class="fas fa-check-circle me-2"></i> {{ passwordMessage }}
            <button type="button" class="btn-close" (click)="passwordMessage = ''"></button>
          </div>

          <div *ngIf="passwordError" class="alert alert-danger alert-dismissible fade show border-0 shadow-sm mb-4" role="alert">
            <i class="fas fa-exclamation-triangle me-2"></i> {{ passwordError }}
            <button type="button" class="btn-close" (click)="passwordError = ''"></button>
          </div>

          <!-- Información Informativa -->
          <div class="mb-4 text-center">
            <p class="text-muted small">
              Se recomienda usar una contraseña fuerte que no utilices en otros sitios. 
              Al cambiarla, todas tus sesiones activas podrían requerir un nuevo ingreso.
            </p>
          </div>

          <!-- Formulario -->
          <form (ngSubmit)="onChangePassword()" #secForm="ngForm">
            <!-- Contraseña Actual -->
            <div class="mb-4">
              <label class="form-label small fw-bold text-uppercase text-muted">Contraseña Actual</label>
              <div class="input-group">
                <span class="input-group-text bg-light border-0"><i class="fas fa-lock text-muted"></i></span>
                <input type="password" name="currentPassword" 
                       [(ngModel)]="passwordForm.currentPassword" 
                       class="form-control border-0 bg-light shadow-none" 
                       placeholder="Ingresa tu contraseña actual" required>
              </div>
            </div>

            <hr class="my-4 opacity-10">

            <!-- Nueva Contraseña -->
            <div class="mb-4">
              <label class="form-label small fw-bold text-uppercase text-muted">Nueva Contraseña</label>
              <div class="input-group">
                <span class="input-group-text bg-light border-0"><i class="fas fa-key text-muted"></i></span>
                <input type="password" name="newPassword" 
                       [(ngModel)]="passwordForm.newPassword" 
                       class="form-control border-0 bg-light shadow-none" 
                       placeholder="Mínimo 8 caracteres" required>
              </div>
            </div>

            <!-- Confirmar Nueva Contraseña -->
            <div class="mb-5">
              <label class="form-label small fw-bold text-uppercase text-muted">Confirmar Nueva Contraseña</label>
              <div class="input-group">
                <span class="input-group-text bg-light border-0"><i class="fas fa-check-double text-muted"></i></span>
                <input type="password" name="confirmPassword" 
                       [(ngModel)]="passwordForm.confirmPassword" 
                       class="form-control border-0 bg-light shadow-none" 
                       placeholder="Repite la nueva contraseña" required>
              </div>
            </div>

            <!-- Botones de Acción -->
            <div class="d-grid gap-2">
              <button type="submit" class="btn btn-primary py-3 fw-bold shadow-sm" [disabled]="isPasswordChanging || !secForm.valid">
                <span *ngIf="!isPasswordChanging"><i class="fas fa-save me-2"></i> Actualizar Contraseña</span>
                <span *ngIf="isPasswordChanging">
                  <span class="spinner-border spinner-border-sm me-2" role="status" aria-hidden="true"></span>
                  Procesando...
                </span>
              </button>
              <button type="button" class="btn btn-link text-muted" routerLink="/profile">
                Cancelar y regresar
              </button>
            </div>
          </form>
        </div>
      </div>

    </div>
  </div>
</div>
